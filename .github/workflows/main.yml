name: Exam Result Auto Bot
on:
  schedule:
    - cron: '*/5 * * * *' # ၅ မိနစ်တစ်ခါ Website ကို အလိုအလျောက် စစ်ဆေးမည်
  workflow_dispatch: # လူကိုယ်တိုင် စမ်းသပ်နှိပ်ရန်

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run Bot
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }} # <--- ဤလိုင်းကို အသစ်ထပ်ထည့်ပါ
        run: python bot.py
